name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint core
        run: node --check src/index.js src/core/*.js

      - name: Lint extensions
        run: |
          for f in extensions/*/index.js; do
            echo "Checking $f"
            node --check "$f"
          done
