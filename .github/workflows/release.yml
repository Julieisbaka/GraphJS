name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'extensions/*/package.json'

jobs:
  release:
    name: Create releases
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create releases for updated packages
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const packages = [
              {
                pkgPath:       'package.json',
                changelogPath: 'CHANGELOG.md',
                tagPrefix:     'v',
                dir:           '.',
                entry:         'src/index.js',
              },
              {
                pkgPath:       'extensions/crosshair/package.json',
                changelogPath: 'extensions/crosshair/CHANGELOG.md',
                tagPrefix:     'crosshair-v',
                dir:           'extensions/crosshair',
                entry:         'index.js',
              },
              {
                pkgPath:       'extensions/legend/package.json',
                changelogPath: 'extensions/legend/CHANGELOG.md',
                tagPrefix:     'legend-v',
                dir:           'extensions/legend',
                entry:         'index.js',
              },
              {
                pkgPath:       'extensions/pan-zoom/package.json',
                changelogPath: 'extensions/pan-zoom/CHANGELOG.md',
                tagPrefix:     'pan-zoom-v',
                dir:           'extensions/pan-zoom',
                entry:         'index.js',
              },
              {
                pkgPath:       'extensions/time-scale/package.json',
                changelogPath: 'extensions/time-scale/CHANGELOG.md',
                tagPrefix:     'time-scale-v',
                dir:           'extensions/time-scale',
                entry:         'index.js',
              },
              {
                pkgPath:       'extensions/tooltip-cursor/package.json',
                changelogPath: 'extensions/tooltip-cursor/CHANGELOG.md',
                tagPrefix:     'tooltip-cursor-v',
                dir:           'extensions/tooltip-cursor',
                entry:         'index.js',
              },
              {
                pkgPath:       'extensions/watermark/package.json',
                changelogPath: 'extensions/watermark/CHANGELOG.md',
                tagPrefix:     'watermark-v',
                dir:           'extensions/watermark',
                entry:         'index.js',
              },
            ];

            // Extract the changelog section for a given version.
            function extractChangelogSection(changelogContent, version) {
              const escaped = version.replace(/\./g, '\\.');
              const startRe = new RegExp(`^## \\[${escaped}\\]`, 'm');
              const start = changelogContent.search(startRe);
              if (start === -1) return '';

              const afterHeader = changelogContent.indexOf('\n', start) + 1;
              const nextSection = changelogContent.slice(afterHeader).search(/^## \[/m);
              const end = nextSection === -1
                ? changelogContent.length
                : afterHeader + nextSection;

              return changelogContent.slice(afterHeader, end).trim();
            }

            // Determine which package.json files changed in this push.
            let changedFiles;
            try {
              changedFiles = execSync('git diff --name-only HEAD~1 HEAD', { encoding: 'utf8' })
                .split('\n')
                .map(l => l.trim())
                .filter(Boolean);
            } catch {
              changedFiles = packages.map(p => p.pkgPath);
            }

            const esbuild = path.resolve('node_modules/.bin/esbuild');

            for (const pkg of packages) {
              if (!changedFiles.includes(pkg.pkgPath)) {
                core.info(`${pkg.pkgPath} unchanged — skipping.`);
                continue;
              }

              const pkgData = JSON.parse(fs.readFileSync(pkg.pkgPath, 'utf8'));
              const { name, version } = pkgData;
              const tag = `${pkg.tagPrefix}${version}`;

              // Skip if a release for this tag already exists.
              try {
                await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  tag,
                });
                core.info(`Release ${tag} already exists — skipping.`);
                continue;
              } catch (err) {
                if (err.status !== 404) throw err;
              }

              // Build unminified and minified ESM bundles.
              const distDir = path.join(pkg.dir, 'dist');
              fs.mkdirSync(distDir, { recursive: true });
              execSync(
                `"${esbuild}" ${pkg.entry} --bundle --format=esm --outfile=dist/index.js`,
                { cwd: pkg.dir }
              );
              execSync(
                `"${esbuild}" ${pkg.entry} --bundle --format=esm --minify --outfile=dist/index.min.js`,
                { cwd: pkg.dir }
              );

              // Pre-release check + release notes extraction from changelog.
              let changelog = "";
              try {
                changelog = fs.readFileSync(pkg.changelogPath, 'utf8');
              } catch {
                throw new Error(`Pre-release check failed: Could not read changelog '${pkg.changelogPath}' for ${name}@${version}.`);
              }

              const body = extractChangelogSection(changelog, version);
              if (!body) {
                throw new Error(
                  `Pre-release check failed: Missing changelog section '## [${version}]' in '${pkg.changelogPath}' for ${name}@${version}.`
                );
              }

              // Create the release.
              const release = await github.rest.repos.createRelease({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                tag_name:   tag,
                name:       `${name} ${version}`,
                body,
                draft:      false,
                prerelease: false,
              });

              // Upload unminified and minified builds as release assets.
              for (const [file, assetName] of [
                ['dist/index.js',     `${name}.js`],
                ['dist/index.min.js', `${name}.min.js`],
              ]) {
                const data = fs.readFileSync(path.join(pkg.dir, file));
                await github.rest.repos.uploadReleaseAsset({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  release_id: release.data.id,
                  name:       assetName,
                  data,
                });
              }

              core.info(`Created release: ${tag} (${name}.js + ${name}.min.js)`);
            }
